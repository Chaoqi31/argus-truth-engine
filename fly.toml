# Fly.io app config for the Argus backend (FastAPI + WebSocket).
#
# First-time setup:
#   fly launch --no-deploy --copy-config --name argus-api
#   fly volumes create argus_data --region sin --size 1
#   fly secrets set ARGUS_CORS_ALLOW_ORIGINS=https://your-vercel-app.vercel.app
#   fly deploy --remote-only
#
# BYOK mode: leave ARGUS_MIROMIND_API_KEY unset so each visitor must supply
# their own MiroMind key via the X-Miromind-Key header.

app = "argus-api"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = 10

[build]

[env]
  PORT = "8080"
  ARGUS_STORAGE_ROOT = "/data/uploads"
  # BYOK by default — operator does NOT bake a key in.
  ARGUS_MIROMIND_API_KEY = ""

[[mounts]]
  source = "argus_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # WebSocket-friendly: no idle timeout shorter than a long audit.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
