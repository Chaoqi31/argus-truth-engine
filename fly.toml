# fly.toml app configuration file generated for argus-truth on 2026-05-22T13:44:35+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'argus-truth'
primary_region = 'sin'
kill_signal = 'SIGINT'
kill_timeout = '10s'

[build]

[env]
  ARGUS_MIROMIND_API_KEY = ''
  ARGUS_STORAGE_ROOT = '/data/uploads'
  PORT = '8080'

[[mounts]]
  source = 'argus_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 40
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
